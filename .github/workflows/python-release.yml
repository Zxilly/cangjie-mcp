name: Python Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  linux:
    name: Build Linux wheels (${{ matrix.platform.flavor }}-${{ matrix.platform.artifact_suffix }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: ${{ github.event_name != 'workflow_dispatch' }}
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: x86_64
            flavor: legacy
            manylinux: "2014"
            container: "on"
            args: --release --features "local,legacy" --out dist --locked --compatibility pypi
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: aarch64
            flavor: legacy
            manylinux: "2014"
            container: "on"
            args: --release --features "local,legacy" --out dist --locked --compatibility pypi
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: x86_64
            flavor: modern
            manylinux: "auto"
            container: "off"
            args: --release --features local --out dist --locked --compatibility pypi
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: aarch64
            flavor: modern
            manylinux: "auto"
            container: "off"
            args: --release --features local --out dist --locked --compatibility pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build wheel
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          container: ${{ matrix.platform.container }}
          args: ${{ matrix.platform.args }}
          before-script-linux: |
            ARCH="$(uname -m)"
            if [ "$ARCH" = "x86_64" ]; then
              PROTOC_ARCH="x86_64"
            elif [ "$ARCH" = "aarch64" ]; then
              PROTOC_ARCH="aarch_64"
            else
              echo "Unsupported architecture for protoc: $ARCH"
              exit 1
            fi
            PROTOC_ZIP="protoc-33.5-linux-${PROTOC_ARCH}.zip"
            PROTOC_DIR="${HOME}/.local"
            curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v33.5/${PROTOC_ZIP}"
            python3 -m zipfile -e "${PROTOC_ZIP}" "${PROTOC_DIR}"
            rm "${PROTOC_ZIP}"
            chmod +x "${PROTOC_DIR}/bin/protoc"
            export PATH="${PROTOC_DIR}/bin:${PATH}"
            protoc --version

      - name: Test wheel
        run: |
          pip install cangjie_mcp --find-links dist --force-reinstall
          cangjie-mcp --help
          python -m cangjie_mcp --help

      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-linux-${{ matrix.platform.flavor }}-${{ matrix.platform.artifact_suffix }}
          path: dist

  windows:
    name: Build Windows wheels
    runs-on: windows-latest
    strategy:
      fail-fast: ${{ github.event_name != 'workflow_dispatch' }}
      matrix:
        platform:
          - target: x86_64-pc-windows-msvc
            artifact_suffix: x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "33.5"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheel
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --features local --out dist

      - name: Test wheel
        run: |
          pip install cangjie_mcp --find-links dist --force-reinstall
          cangjie-mcp --help
          python -m cangjie_mcp --help

      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-windows-${{ matrix.platform.artifact_suffix }}
          path: dist

  macos:
    name: Build macOS wheels
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: ${{ github.event_name != 'workflow_dispatch' }}
      matrix:
        platform:
          - runner: macos-15
            target: aarch64-apple-darwin
            artifact_suffix: aarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "33.5"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheel
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --features local --out dist

      - name: Test wheel
        run: |
          pip install cangjie_mcp --find-links dist --force-reinstall
          cangjie-mcp --help
          python -m cangjie_mcp --help

      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-macos-${{ matrix.platform.artifact_suffix }}
          path: dist

  sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "33.5"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sdist
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    needs: [linux, windows, macos, sdist]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"

      - name: List dist contents
        run: ls -la dist/

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0

      - name: Publish to PyPI
        run: uv publish dist/*

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: dist/*

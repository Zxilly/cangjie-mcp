name: Rust Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.package_name }} binary archive
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary_name: cangjie
            archive_name: cangjie-x86_64-unknown-linux-gnu.tar.gz
            container_image: quay.io/pypa/manylinux_2_28_x86_64
          - package_name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: cangjie
            archive_name: cangjie-aarch64-unknown-linux-gnu.tar.gz
            container_image: quay.io/pypa/manylinux_2_28_aarch64
          - package_name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: cangjie.exe
            archive_name: cangjie-x86_64-pc-windows-msvc.zip
          - package_name: darwin-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            binary_name: cangjie
            archive_name: cangjie-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Protoc
        if: runner.os != 'Linux'
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "33.5"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Linux binary in manylinux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            "${{ matrix.container_image }}" \
            /bin/bash -lc '
              set -euxo pipefail
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              source "$HOME/.cargo/env"
              rustup default stable
              rustup target add "${{ matrix.target }}"

              ARCH="$(uname -m)"
              if [ "$ARCH" = "x86_64" ]; then
                PROTOC_ARCH="x86_64"
              elif [ "$ARCH" = "aarch64" ]; then
                PROTOC_ARCH="aarch_64"
              else
                echo "Unsupported architecture for protoc: $ARCH"
                exit 1
              fi

              PROTOC_ZIP="protoc-33.5-linux-${PROTOC_ARCH}.zip"
              PROTOC_DIR="${HOME}/.local"
              curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v33.5/${PROTOC_ZIP}"
              python3 -m zipfile -e "${PROTOC_ZIP}" "${PROTOC_DIR}"
              rm "${PROTOC_ZIP}"
              chmod +x "${PROTOC_DIR}/bin/protoc"
              export PATH="${PROTOC_DIR}/bin:${PATH}"

              cargo build -p cangjie-cli --release --features local --target "${{ matrix.target }}"
            '

      - name: Build non-Linux binary
        if: runner.os != 'Linux'
        run: cargo build -p cangjie-cli --release --features local --target ${{ matrix.target }}

      - name: Smoke test binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            "./${BINARY}" --help > /dev/null
          else
            "${BINARY}" --help > /dev/null
          fi

      - name: Create Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          STAGE_DIR="release-stage/${{ matrix.target }}"
          mkdir -p "$STAGE_DIR"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$STAGE_DIR/cangjie"
          cp LICENSE "$STAGE_DIR/"
          cp README.md "$STAGE_DIR/"
          mkdir -p release-dist
          tar -czf "release-dist/${{ matrix.archive_name }}" -C "$STAGE_DIR" .

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stageDir = Join-Path $PWD "release-stage\\${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "target\\${{ matrix.target }}\\release\\${{ matrix.binary_name }}" (Join-Path $stageDir 'cangjie.exe')
          Copy-Item "LICENSE" $stageDir
          Copy-Item "README.md" $stageDir
          New-Item -ItemType Directory -Force -Path "release-dist" | Out-Null
          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath "release-dist\\${{ matrix.archive_name }}" -Force

      - name: Upload binary archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rust-${{ matrix.package_name }}
          path: release-dist/${{ matrix.archive_name }}

  publish-release:
    name: Upload binaries to GitHub Release
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    needs: [build-binaries]
    steps:
      - name: Download binary archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rust-*
          merge-multiple: true
          path: release-dist

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: release-dist/*
